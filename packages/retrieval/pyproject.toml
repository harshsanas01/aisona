[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "carecall-retrieval"
version = "0.1.0"
description = "CareCall Insight chunking + hybrid lexical/semantic retrieval"
requires-python = ">=3.11"
dependencies = [
  "carecall-domain",
  "carecall-application",
  "scikit-learn>=1.3.0",
  "numpy>=1.26.0",
]

[tool.setuptools.packages.find]
where = ["src"]
