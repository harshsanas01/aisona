[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "carecall-llm"
version = "0.1.0"
description = "CareCall Insight answer-generation providers and grounding policy"
requires-python = ">=3.11"
dependencies = [
  "carecall-domain",
  "carecall-application",
  "openai>=1.40.0",
  "pydantic>=2.7.0",
]

[tool.setuptools.packages.find]
where = ["src"]
