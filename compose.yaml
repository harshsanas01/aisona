services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: carecall
      POSTGRES_USER: carecall
      POSTGRES_PASSWORD: carecall
    ports:
      - "5442:5432"
    volumes:
      - carecall_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carecall -d carecall"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /app/packages/persistence
    environment:
      DATABASE_URL: postgresql+psycopg://carecall:carecall@postgres:5432/carecall
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      CARECALL_STORAGE_MODE: postgres
      CARECALL_ANSWER_MODE: mock
      DATABASE_URL: postgresql+psycopg://carecall:carecall@postgres:5432/carecall
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://carecall:carecall@postgres:5432/carecall
      CARECALL_WORKER_POLL_SECONDS: "5"
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  carecall_pgdata:
