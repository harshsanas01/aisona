name: API CI

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - ".github/workflows/api-ci.yml"

concurrency:
  group: api-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: carecall
          POSTGRES_USER: carecall
          POSTGRES_PASSWORD: carecall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carecall -d carecall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://carecall:carecall@localhost:5432/carecall
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install \
            -e packages/domain \
            -e packages/application \
            -e packages/retrieval \
            -e packages/llm \
            -e "packages/persistence[postgres]" \
            -e packages/observability \
            -e "apps/api[dev,postgres]" \
            -e "apps/worker[dev]" \
            ruff mypy

      - name: Lint (ruff)
        run: ruff check packages apps/api/src apps/worker/src scripts

      - name: Type check (mypy)
        run: |
          mypy packages/domain/src packages/application/src packages/retrieval/src \
            packages/llm/src packages/persistence/src packages/observability/src \
            apps/api/src apps/worker/src --ignore-missing-imports

      - name: Unit tests (in-memory mode, no DATABASE_URL)
        run: python -m pytest apps/api/tests -v
        env:
          DATABASE_URL: ""

      - name: Apply migrations
        working-directory: packages/persistence
        run: alembic upgrade head

      - name: Migration round-trip check (downgrade then upgrade)
        working-directory: packages/persistence
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Integration tests (contract tests against real Postgres, worker)
        run: python -m pytest tests/contract apps/worker/tests -v

      - name: Evaluation suite
        run: |
          python scripts/evaluate.py
          python scripts/evaluate_retrieval.py
          python scripts/evaluate_grounding.py

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: artifacts/
          if-no-files-found: ignore
